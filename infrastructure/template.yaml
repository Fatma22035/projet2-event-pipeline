AWSTemplateFormatVersion: "2010-09-09"
Description: "Projet 2 - Pipeline de traitement de donnees"

Parameters:
  NotificationEmail:
    Type: String
    Default: "22035@supnum.mr"
    Description: "Adresse email a notifier"

Conditions:
  HasEmail: !Not [!Equals [!Ref NotificationEmail, ""]]

Resources:
  Bucket:
    Type: AWS::S3::Bucket
    DependsOn: PermissionS3
    Properties:
      BucketName: bucket-projet2
      NotificationConfiguration:
        LambdaConfigurations:
          - Event: 's3:ObjectCreated:*'
            Function: !GetAtt Lambda.Arn
      Tags:
        - Key: supnum:Lab
          Value: PROJET-2


  Table:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: table-projet2
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      Tags:
        - Key: supnum:Lab
          Value: PROJET-2


  Topic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: topic-projet2
      Tags:
        - Key: supnum:Lab
          Value: PROJET-2


  Abonnement:
    Type: AWS::SNS::Subscription
    Condition: HasEmail
    Properties:
      TopicArn: !Ref Topic
      Protocol: email
      Endpoint: !Ref NotificationEmail

  RoleLambda:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: LambdaAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                Resource: arn:aws:s3:::bucket-projet2/*
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                Resource: !GetAtt Table.Arn
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref Topic
      Tags:
        - Key: supnum:Lab
          Value: PROJET-2


  Lambda:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: lambda-projet2
      Runtime: python3.9
      Handler: index.lambda_handler
      Role: !GetAtt RoleLambda.Arn
      Timeout: 30
      MemorySize: 128
      Environment:
        Variables:
          TABLE_NAME: !Ref Table
          TOPIC_ARN: !Ref Topic
      Code:
        ZipFile: |
          import json
          import os
          import urllib.parse
          import boto3
          from datetime import datetime, timezone

          dynamodb = boto3.resource('dynamodb')
          sns = boto3.client('sns')

          TABLE_NAME = os.environ.get('TABLE_NAME')
          TOPIC_ARN = os.environ.get('TOPIC_ARN')

          def lambda_handler(event, context):
              table = dynamodb.Table(TABLE_NAME)
              results = []

              for record in event['Records']:
                  bucket = record['s3']['bucket']['name']
                  key = urllib.parse.unquote_plus(record['s3']['object']['key'])
                  size = record['s3']['object'].get('size', 0)
                  event_time = record['eventTime']

                  table.put_item(Item={
                      'id': key,
                      'bucket': bucket,
                      'sizeBytes': size,
                      'eventTime': event_time,
                      'processedAt': datetime.now(timezone.utc).isoformat()
                  })

                  if TOPIC_ARN:
                      sns.publish(
                          TopicArn=TOPIC_ARN,
                          Subject='Fichier traite avec succes',
                          Message=f'Fichier: {key}\nBucket: {bucket}\nTaille: {size} octets\nTraite le: {event_time}'
                      )

                  results.append({'key': key, 'size': size})

              return {'statusCode': 200, 'body': json.dumps({'processed': results})}
      Tags:
        - Key: supnum:Lab
          Value: PROJET-2

  PermissionS3:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref Lambda
      Action: lambda:InvokeFunction
      Principal: s3.amazonaws.com
      SourceArn: arn:aws:s3:::bucket-projet2